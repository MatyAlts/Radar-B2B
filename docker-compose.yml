version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: radar-db
    environment:
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radar_dev_password
      POSTGRES_DB: radar_db
    volumes:
      - radar_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radar"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: radar-api
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://radar:radar_dev_password@db:5432/radar_db
      APOLLO_API_KEY: ${APOLLO_API_KEY:-placeholder}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-placeholder}
      DEBUG: "true"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  radar_db_data:
