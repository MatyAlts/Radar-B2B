version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: radar-db
    environment:
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radar_dev_password
      POSTGRES_DB: radar_db
    volumes:
      - radar_db_data:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radar"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: radar-api
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://radar:radar_dev_password@db:5432/radar_db
      DEBUG: "true"
    volumes:
      - .:/app
    ports:
      - "18000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:18000
    container_name: radar-frontend
    ports:
      - "13000:3000"
    depends_on:
      - api

volumes:
  radar_db_data:
