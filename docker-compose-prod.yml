version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radar_dev_password
      POSTGRES_DB: radar_db
    volumes:
      - radar_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radar -d radar_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - radar-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "alembic upgrade head &&
             uvicorn src.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://radar:radar_dev_password@db:5432/radar_db}
      APOLLO_API_KEY: ${APOLLO_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - radar-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      INTERNAL_API_URL: http://api:8000
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - radar-net

networks:
  radar-net:
    driver: bridge

volumes:
  radar_db_data:
